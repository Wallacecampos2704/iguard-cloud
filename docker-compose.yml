services:
  postgres:
    image: postgres:16
    container_name: iguard-postgres
    restart: always
    environment:
      POSTGRES_USER: iguard
      POSTGRES_PASSWORD: iguard123
      POSTGRES_DB: iguard
    ports:
      - "5432:5432"
    volumes:
      - iguard_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: iguard-redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  iguard_postgres_data: